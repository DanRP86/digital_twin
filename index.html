<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Rubio - Digital Twin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES DE DISEÑO --- */
        :root {
            --bg-body: #0a0c10;
            --bg-panel: rgba(20, 22, 28, 0.75); 
            --primary: #3b82f6; 
            --accent: #60a5fa;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --glass: blur(16px) saturate(180%);
        }

        /* --- ESTILOS GENERALES --- */
        body { 
            margin: 0; 
            /* APLICAMOS LA NUEVA FUENTE A TODO */
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-body);
            background-image: url('https://images.pexels.com/photos/29450016/pexels-photo-29450016.jpeg'); 
            background-size: cover;
            background-position: center;
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- MITAD IZQUIERDA: SPLINE (40%) --- */
        .avatar-container { 
            width: 40%; /* <--- ¡Cambiado a 40%! */
            height: 100%; 
            background-color: transparent; 
            position: relative;
        }
        
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
        }

        /* --- MITAD DERECHA: INTERFAZ CHAT (60%) --- */
        .info-container { 
            width: 60%; /* <--- ¡Cambiado a 60%! */
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            background-color: var(--bg-panel);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-left: 1px solid var(--border);
        }
        
        /* --- CABECERO ESTILO LINKEDIN --- */
        .header-profile-card { 
            padding: 35px 50px; 
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            /* AQUÍ PEGAS LA URL "RAW" DE GITHUB */
            background-image: url('https://media.licdn.com/dms/image/v2/D4D03AQFX4REnfSMrrQ/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1676215072574?e=1778112000&v=beta&t=-aRi331qvEBShnG4iNl2lVFPhznK6VQLR1AXKGYP1AY');
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .profile-info {
            flex-grow: 1;
        }

        .profile-name { 
            color: var(--text-main); 
            font-size: 1.8em; 
            font-weight: 700;
            margin: 0; 
            letter-spacing: -0.5px;
        }
        
        .profile-title { 
            color: var(--accent); 
            font-size: 1em; 
            font-weight: 400; 
            margin: 5px 0 12px 0; 
        }

        .linkedin-button {
            display: inline-flex;
            align-items: center;
            padding: 8px 18px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px; /* Un toque más cuadrado y moderno */
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .linkedin-button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        /* --- CAJA DE MENSAJES --- */
        .chat-box { 
            flex-grow: 1; 
            padding: 30px 50px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scroll-behavior: smooth;
        }
        
        .msg { 
            padding: 16px 22px; 
            border-radius: 12px; 
            max-width: 75%; 
            line-height: 1.6; 
            font-size: 1em; 
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .msg-user { 
            background-color: var(--primary);
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        
        .msg-ai { 
            background-color: rgba(255, 255, 255, 0.05); 
            color: #e5e7eb; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            border: 1px solid var(--border);
        }

        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.1); border-radius: 3px; }
        
        /* --- ÁREA DE ENTRADA --- */
        .input-area { 
            padding: 25px 50px 35px; 
            display: flex; 
            gap: 15px; 
            background-color: transparent; 
            border-top: 1px solid var(--border); 
        }
        
        input { 
            flex-grow: 1; 
            padding: 16px 20px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background-color: rgba(0, 0, 0, 0.3); 
            color: white; 
            font-family: inherit; /* Hereda la fuente Space Grotesk */
            font-size: 1.05em; 
            transition: all 0.3s ease;
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 0 32px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            font-family: inherit;
            font-size: 1.05em;
            transition: all 0.3s ease;
        }
        
        button:hover { background-color: #2563eb; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        /* --- VERSIÓN MÓVIL (Smartphones) --- */
        @media (max-width: 768px) {
            /* 1. Ocultamos el modelo 3D para ahorrar batería y espacio */
            .avatar-container {
                display: none;
            }

            /* 2. El panel de cristal ahora ocupa toda la pantalla */
            .info-container {
                width: 100%;
                height: 100vh;
                top: 0;
                right: 0;
                border-radius: 0; /* Quitamos bordes redondeados */
                border: none;
                background: rgba(10, 12, 16, 0.85); /* Un poco más oscuro para leer mejor */
            }

            /* 3. Ajustamos el cabecero para que quepa bien */
            .header-profile-card {
                padding: 20px;
                flex-direction: column; /* Apilamos foto y texto */
                text-align: center;
                gap: 12px;
            }

            .profile-pic {
                width: 60px;
                height: 60px;
            }

            .profile-name {
                font-size: 1.3em;
            }

            /* 4. Ocultamos el texto de instrucciones de PC */
            .instruction-box {
                display: none;
            }

            /* 5. Ajustamos el chat y el input */
            .chat-box {
                padding: 15px 20px;
            }

            .msg {
                max-width: 90%; /* Burbujas más anchas en móvil */
            }

            .input-area {
                padding: 15px 20px 20px;
            }

            input {
                padding: 12px 15px;
            }

            button {
                padding: 0 18px;
            }
        }

    </style>
</head>
<body>

    <div class="avatar-container">
        <iframe src="https://my.spline.design/untitled-A1vHrbkLY8bHQqdHNP9ckicX/" title="Avatar 3D"></iframe>
    </div>

    <div class="info-container">
        <div class="header-profile-card">
            <div class="profile-pic"></div>
            <div class="profile-info" style="display: flex; flex-direction: column; gap: 8px;">
        
                <h1 class="profile-name" style="margin: 0; line-height: 1.1;">Daniel Rubio Paniagua</h1>
        
                <p class="profile-title" style="margin: 0; font-size: 1.05em; color: #e0e0e0; padding-bottom: 8px;">
                Regional Real Estate & Facility Mgmt Portfolio Manager | AI Champion
                </p>
        
                <div style="margin-bottom: 12px;">
                    <a href="https://www.linkedin.com/in/danielrubiopaniagua" target="_blank" class="linkedin-button" style="display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 6px; background-color: #0077b5; color: white; text-decoration: none; font-weight: bold;">
                        <svg style="width:16px; height:16px; margin-right:8px; fill:white;" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        See Full Profile
                    </a>
                </div>
        
                <p style="font-size: 0.85em; color: var(--accent); margin: 0; opacity: 0.9;">
                    🖱️ <i>Interact with and rotate the 3D avatar by using your keyboard or mouse</i>
                </p>

         </div>
    </div>
        
        <div class="chat-box" id="chatBox">
            <div class="msg msg-ai">Hi! I'm Daniel's digital twin. ¿How can I help you today?</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Send your message here..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let chatHistory = []; 

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const message = inputField.value.trim();
            if (!message) return;

            addMessageToChat('user', message);
            inputField.value = '';

            const loadingId = addMessageToChat('ai', 'Escribiendo...');

            try {
                const response = await fetch('/api/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, history: chatHistory })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                document.getElementById(loadingId).innerText = data.reply;

                chatHistory.push({ role: 'user', content: message });
                chatHistory.push({ role: 'assistant', content: data.reply });

            } catch (error) {
                document.getElementById(loadingId).innerText = "Hubo un error de conexión con mi sistema virtual. ¿Puedes intentarlo de nuevo?";
                console.error("Error en el chat:", error);
            }
        }

        function addMessageToChat(role, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${role}`;
            msgDiv.innerText = text;
            const uniqueId = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
            msgDiv.id = uniqueId;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; 
            return uniqueId;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
