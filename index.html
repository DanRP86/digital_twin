<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Rubio - Gemelo Digital</title>
    <style>
        /* Estilos generales y Tema Oscuro Elegante */
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0f1115; 
            color: #f0f0f0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Contenedor izquierdo: El modelo 3D */
        .avatar-container { 
            width: 50%; 
            height: 100%; 
            background-color: #1a1d24; 
            border-right: 1px solid #2d313a; 
            position: relative;
        }
        
        /* El iframe que carga tu Spline sin bordes */
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
        }
        
        /* Contenedor derecho: Interfaz del Chat */
        .info-container { 
            width: 50%; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            background-color: #0f1115; 
        }
        
        .header { 
            padding: 30px 40px 10px; 
            border-bottom: 1px solid #2d313a;
        }
        
        h1 { 
            color: #60a5fa; 
            font-size: 2em; 
            margin: 0 0 5px 0; 
        }
        
        h2 { 
            color: #9ca3af; 
            font-size: 1.1em; 
            font-weight: 400; 
            margin: 0; 
        }
        
        /* Caja de mensajes del chat */
        .chat-box { 
            flex-grow: 1; 
            padding: 20px 40px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .msg { 
            padding: 12px 18px; 
            border-radius: 12px; 
            max-width: 80%; 
            line-height: 1.5; 
            font-size: 0.95em; 
        }
        
        .msg-user { 
            background-color: #2563eb; 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }
        
        .msg-ai { 
            background-color: #1f2937; 
            color: #d1d5db; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            border: 1px solid #374151;
        }
        
        /* Área de entrada de texto */
        .input-area { 
            padding: 20px 40px 30px; 
            display: flex; 
            gap: 10px; 
            background-color: #0f1115; 
            border-top: 1px solid #2d313a; 
        }
        
        input { 
            flex-grow: 1; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #374151; 
            background-color: #1f2937; 
            color: white; 
            font-size: 1em; 
        }
        
        input:focus { 
            outline: none; 
            border-color: #60a5fa; 
        }
        
        button { 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            padding: 0 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background-color 0.3s;
        }
        
        button:hover { 
            background-color: #1d4ed8; 
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <iframe src="https://my.spline.design/untitled-A1vHrbkLY8bHQqdHNP9ckicX/" title="Avatar 3D"></iframe>
    </div>

    <div class="info-container">
        <div class="header">
            <h1>Daniel Rubio Paniagua</h1>
            <h2>Gemelo Digital & AI Assistant</h2>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="msg msg-ai">Hola. Soy el gemelo digital de Daniel. Conozco su trayectoria, habilidades y proyectos. ¿En qué te puedo ayudar hoy?</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu mensaje aquí..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        let chatHistory = []; 

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const message = inputField.value.trim();
            if (!message) return;

            // 1. Mostrar mensaje del usuario
            addMessageToChat('user', message);
            inputField.value = '';

            // 2. Mostrar "Escribiendo..."
            const loadingId = addMessageToChat('ai', 'Escribiendo...');

            try {
                // 3. Llamada relativa a la API Serverless de Vercel (¡El cambio clave!)
                const response = await fetch('/api/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        history: chatHistory 
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 4. Actualizar con la respuesta real
                document.getElementById(loadingId).innerText = data.reply;

                // 5. Guardar en el historial
                chatHistory.push({ role: 'user', content: message });
                chatHistory.push({ role: 'assistant', content: data.reply });

            } catch (error) {
                document.getElementById(loadingId).innerText = "Hubo un error de conexión con el servidor. ¿Puedes intentarlo de nuevo?";
                console.error("Error en el chat:", error);
            }
        }

        function addMessageToChat(role, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${role}`;
            msgDiv.innerText = text;
            
            const uniqueId = 'msg-' + Date.now();
            msgDiv.id = uniqueId;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; 
            return uniqueId;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
